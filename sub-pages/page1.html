<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1 · Day and Night</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="../style.css">
    <script src="../script.js"></script>
</head>
<body class="art-page page-1">
    <section class="art-layout">
        <a class="back-link" href="../index.html">← Back to gallery</a>

        <div class="page-copy">
            <p class="eyebrow">Page 1 · Hover + CSS + Animate</p>
            <h1>Day and Night</h1>
            <p>Hover over the grassy ground and watch a bright flower rise up from the earth.</p>
        </div>

        <div id="hover-canvas" class="art-canvas flower-scene">
            <div class="sun-glow"></div>

            <div class="flower">
                <div class="stem"></div>
                <div class="leaf leaf-left"></div>
                <div class="leaf leaf-right"></div>
                <div class="bloom-core"></div>
                <div class="petal petal-1"></div>
                <div class="petal petal-2"></div>
                <div class="petal petal-3"></div>
                <div class="petal petal-4"></div>
            </div>

            <div id="ground-trigger" class="ground-strip"></div>
            <p class="canvas-caption">Hover over the ground to help the flower emerge.</p>
        </div>
    </section>
</body>
</html>
